<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background with enhanced gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="35%" stop-color="#0EA5E9" />
      <stop offset="65%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main container with rounded corners -->
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Subtle inner highlight for depth -->
  <rect x="6" y="6" width="52" height="26" rx="16" fill="white" opacity="0.15" />
  
  <!-- "BB" text with better styling -->
  <text x="32" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="white" letter-spacing="-1" opacity="0.95">BB</text>
  
  <!-- Accent dot with glow effect -->
  <circle cx="50" cy="50" r="6" fill="#10B981" opacity="0.3" />
  <circle cx="50" cy="50" r="4.5" fill="#10B981" />
  <circle cx="50" cy="50" r="4.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.6" />
</svg>
