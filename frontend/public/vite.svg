<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background gradient rounded square -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#gradientBg)" />
  
  <!-- "BB" text -->
  <text x="32" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-2">BB</text>
  
  <!-- Accent dot -->
  <circle cx="50" cy="50" r="5" fill="#10B981" stroke="white" stroke-width="2" />
  
  <defs>
    <linearGradient id="gradientBg" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>
</svg>
